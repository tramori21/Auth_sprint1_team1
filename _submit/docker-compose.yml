services:
  auth_pg:
    image: postgres:16
    container_name: auth_pg
    environment:
      POSTGRES_DB: auth
      POSTGRES_DB: auth_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 123qwe
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d auth_db']
      interval: 5s
      timeout: 5s
      retries: 15

  auth_redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - '6380:6379'